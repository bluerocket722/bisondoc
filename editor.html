<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Back Office | Documents</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://docs.bisondoc.com/web-apps/apps/api/documents/api.js"></script>
  <style>
    :root{
      --navy:#16305c; --navy-dark:#0f2342; --blue:#2f6cd6; --blue-soft:#e8f0fe;
      --green:#2e9e5b; --orange:#e8833a; --ink:#1c2733; --sub:#5f6b7a;
      --border:#dde3ec; --bg:#f4f6fa; --surface:#fff;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}

    .topbar{height:60px;background:linear-gradient(90deg,var(--navy),var(--navy-dark));display:flex;align-items:center;padding:0 22px;gap:14px;color:#fff}
    .topbar .logo{font-weight:700;font-size:19px;letter-spacing:.3px}
    .topbar .logo span{color:#7fb0ff}
    .topbar .back{margin-left:auto;color:#cfe0ff;text-decoration:none;font-size:14px;font-weight:600}
    .container{max-width:1100px;margin:0 auto;padding:32px 22px 60px}
    .section-title{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--sub);font-weight:700;margin:28px 0 14px}
    .section-title:first-child{margin-top:4px}

    .create-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .create-card{background:var(--surface);border:1px solid var(--border);border-left:5px solid var(--blue);border-radius:12px;padding:18px;cursor:pointer;transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column;gap:6px}
    .create-card:hover{box-shadow:0 6px 18px rgba(22,48,92,.12);transform:translateY(-2px)}
    .create-card.sheet{border-left-color:var(--green)}
    .create-card.slide{border-left-color:var(--orange)}
    .create-card .ic{font-size:22px}
    .create-card .t{font-weight:700;font-size:15px}
    .create-card .d{font-size:12px;color:var(--sub)}

    .upload label{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
    .upload label:hover{background:var(--navy-dark)}
    .upload input{display:none}

    .docs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
    .doc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:box-shadow .15s,border-color .15s}
    .doc:hover{box-shadow:0 6px 16px rgba(22,48,92,.1);border-color:var(--blue)}
    .doc .badge{width:38px;height:38px;border-radius:9px;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;text-transform:uppercase}
    .doc .nm{font-size:14px;font-weight:600;word-break:break-word;line-height:1.35}
    .empty{color:var(--sub);font-size:14px;padding:10px 2px}

    /* Fullscreen editor — edge to edge */
    .editor-screen{position:fixed;inset:0;z-index:1000;background:#fff;display:none}
    .editor-screen.open{display:block}
    #placeholder{width:100%;height:100%}

    @media (max-width:768px){
      .create-row{grid-template-columns:1fr}
      .container{padding:20px 16px 48px}
      .topbar{padding:0 16px}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">Back<span>Office</span> · Documents</div>
    <a href="back-office.html" class="back">← Tools</a>
    <a href="#" class="back" id="signout" style="margin-left:18px;">Sign out</a>
  </div>
  <div class="container">
    <div class="section-title">Create new</div>
    <div class="create-row">
      <div class="create-card doc-new" data-type="docx"><div class="ic">📄</div><div class="t">Document</div><div class="d">Word-style document</div></div>
      <div class="create-card sheet" data-type="xlsx"><div class="ic">📊</div><div class="t">Spreadsheet</div><div class="d">Excel-style sheet</div></div>
      <div class="create-card slide" data-type="pptx"><div class="ic">📽️</div><div class="t">Presentation</div><div class="d">PowerPoint-style deck</div></div>
    </div>
    <div class="section-title">Or upload</div>
    <div class="upload">
      <label>⬆ Upload a document
        <input type="file" id="fileInput" accept=".docx,.xlsx,.pptx,.doc,.xls,.ppt,.odt,.ods,.odp,.txt,.csv,.pdf">
      </label>
    </div>
    <div class="section-title">Your documents</div>
    <div class="docs-grid" id="fileList"><div class="empty">Loading…</div></div>
  </div>

  <div class="editor-screen" id="editorScreen">
    <div id="placeholder"></div>
  </div>

  <script>
    const SB_URL = 'https://xbwuvaxtnylqvagdvpxp.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhid3V2YXh0bnlscXZhZ2R2cHhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3Njk1NjMsImV4cCI6MjA5NDM0NTU2M30.WnCOew6w9HtQ2eAM1vpSJCb_AjAvv9x7Mev-k2IxSpc';
    const BUCKET = 'documents';
    const LOGIN_URL = 'index.html';
    const TEMPLATES = { docx: 'blank.docx', xlsx: 'blank.xlsx', pptx: 'blank.pptx' };
    const sb = supabase.createClient(SB_URL, SB_KEY);
    let editor = null;
    let userId = null;
    const screen = document.getElementById('editorScreen');

    // Every file lives under a folder named after the signed-in user's id, so each
    // person only ever sees their own documents.
    function userPath(name) { return userId + '/' + name; }

    async function requireSession() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.replace(LOGIN_URL); return null; }
      userId = session.user.id;
      return session;
    }

    async function loadFiles() {
      const list = document.getElementById('fileList');
      const { data, error } = await sb.storage.from(BUCKET).list(userId, { sortBy: { column: 'created_at', order: 'desc' } });
      if (error) { list.innerHTML = '<div class="empty">Could not load files.</div>'; return; }
      const files = (data || []).filter(f => f.id && !f.name.startsWith('.'));
      if (!files.length) { list.innerHTML = '<div class="empty">No documents yet — create or upload one above.</div>'; return; }
      list.innerHTML = '';
      files.forEach(f => {
        const ext = (f.name.split('.').pop() || '').toUpperCase();
        const el = document.createElement('div');
        el.className = 'doc';
        el.innerHTML = '<div class="badge">' + ext + '</div><div class="nm"></div>';
        el.querySelector('.nm').textContent = f.name;
        el.onclick = () => openDoc(f.name);
        list.appendChild(el);
      });
    }

    async function openDoc(name) {
      screen.classList.add('open');
      // Fetch a fresh token in case the session refreshed since page load.
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.replace(LOGIN_URL); return; }
      const res = await fetch('/api/onlyoffice-config?file=' + encodeURIComponent(userPath(name)), {
        headers: { Authorization: 'Bearer ' + session.access_token }
      });
      if (!res.ok) { alert('Could not open document.'); closeEditor(); return; }
      const config = await res.json();
      config.width = '100%'; config.height = '100%';
      config.type = (window.innerWidth <= 768) ? 'mobile' : 'desktop';
      config.events = { onRequestClose: closeEditor };
      if (editor) { editor.destroyEditor(); editor = null; }
      editor = new DocsAPI.DocEditor('placeholder', config);
    }

    function closeEditor() {
      if (editor) { editor.destroyEditor(); editor = null; }
      screen.classList.remove('open');
      loadFiles();
    }

    document.querySelectorAll('.create-card').forEach(card => {
      card.addEventListener('click', async () => {
        const type = card.dataset.type;
        let name = prompt('Name your new file:', 'Untitled');
        if (!name) return;
        name = name.replace(/[^a-zA-Z0-9 _-]/g, '').trim();
        if (!name) return;
        const fileName = name + '.' + type;
        const { error } = await sb.storage.from(BUCKET).copy(TEMPLATES[type], userPath(fileName));
        if (error) { alert('Could not create file: ' + error.message); return; }
        openDoc(fileName);
      });
    });

    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const { error } = await sb.storage.from(BUCKET).upload(userPath(file.name), file, { upsert: true });
      if (error) { alert('Upload failed: ' + error.message); return; }
      openDoc(file.name);
    });

    document.getElementById('signout').addEventListener('click', async (e) => {
      e.preventDefault();
      await sb.auth.signOut();
      window.location.replace(LOGIN_URL);
    });

    (async () => {
      const session = await requireSession();
      if (session) loadFiles();
    })();
  </script>
</body>
</html>
